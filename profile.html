<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #19323C, #004C6B);
        }
        .contianer{
            height: 80vh;
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #9A9A9A;
            border-radius: 25px;
            box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.708);
        }

        .head{
            font-size: 3rem;
            color: rgba(172, 255, 47, 0.726);
        }

        .div{
            width: 100%;
            height: 15%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* gap: 5px; */

        }
        .input{
            width: 80%;
            height: 35px;
            border: none;
            border-radius: 10px;
            /* margin: 10px; */
            /* transition: all 0.8s ease-in; */
        }

        input::placeholder{
            padding-left: 10px;
        }

        .input:hover{
            border: 2px solid green;
        }

        input[tyep="submit"]{
            width: 50px;
            height: 10px;
        }

        #submit{
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(3, 255, 3, 0.877);
            color: black;
            font-size: .9rem;
            box-shadow: 3px 3px 3px rgba(0, 128, 0, 0.621);
            transition: all 0.8s ease-in;
        }

        #submit:hover{
            transform: scale(1.1);
        }


        @media screen and (max-width: 700px ){
            h1{
                font-size: 2.5rem;
            }

            .contianer{
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="contianer">
        <div class="head">
            <h1>
                Profile
            </h1>
        </div>
        <div class="div">
            <input type="text" placeholder="Enter Your Name" class="input">
        </div>
        <div class="div">
        <input type="password" placeholder="Enter password" class="input">
        </div>
        <div class="div">
        <input type="email" placeholder="Email" class="input">
        </div>
        <input type="submit" id="submit">
    </div>
</body>
</html>
